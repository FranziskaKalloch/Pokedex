<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/card.css" />

    <script src="./scripts/main.js" defer></script>
    <script src="./scripts/template.js" defer></script>

    <link rel="icon" type="image/png" href="./assets/icon/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  </head>
  <body onload="init()">
    <header class="main-header">
      <div class="header-frame">
        <div>
          <img src="./assets/img/pokeball.svg" alt="Pokédex Logo" class="logo" />
        </div>
        <div class="search-box">
          <input id="input" type="text" placeholder="Search Pokemon" min="3" />
          <button>Search</button>
        </div>
      </div>
    </header>

    <main>
      <div class="content-frame">
        <!---CONTENT ----->
        <section id="pokedexContainer" class="pokedex-container"></section>

        <div>
          <button onclick="showMore()" id="showMoreBtn">Show More</button>
        </div>
      </div>
    </main>

    <footer class="main-footer">
      <div class="footer-frame">
        <h2>Pokedex</h2>
        <a href="#">Impressum</a>
      </div>
    </footer>

    <!-- DIALOG ------>
    <dialog class="pokemon-dialog" id="pokemonDialog" onclick="closeDialogOutside(event)"></dialog>
  </body>
</html>
